<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agency Instrument · Civic Power Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ffffff; --paper-tint:#fafafa; --cream-2:#f4f4f5;
    --rule:#e4e4e7; --rule-soft:#f0f0f3;
    --ink:#18181b; --ink-2:#27272a; --mute:#71717a;
    --cobalt:#5c7dfa; --cobalt-deep:#3e4f6e; --cobalt-soft:#c5d0fc;
    --terracotta:#b7432b; --olive:#5b7a3a; --amber:#c99633; --teal:#0e8a78;
    --dim-1:#5c7dfa; --dim-2:#9b7ef0; --dim-3:#21b0a1; --dim-4:#5bb36f;
    --signal-green:#22c55e; --signal-yellow:#eab308;
    --display:"Archivo Narrow",-apple-system,system-ui,sans-serif;
    --sans:"DM Sans",-apple-system,system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);font-size:15px;line-height:1.55;color:var(--ink);background:var(--paper-tint);-webkit-font-smoothing:antialiased;}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;border-bottom:1px solid var(--rule);background:var(--paper);
    position:sticky;top:0;z-index:20;}
  .wordmark{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);}
  .wordmark .dot{color:var(--cobalt);margin:0 7px;}
  .wordmark a{color:inherit;text-decoration:none;transition:color .12s;}
  .wordmark a:hover{color:var(--cobalt);}
  .badge-crm{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;
    background:var(--teal);color:#fff;padding:3px 6px;border-radius:3px;margin-left:8px;vertical-align:middle;}
  .badge-dev{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;
    background:rgba(92,125,250,0.1);color:var(--cobalt);border:1px solid var(--cobalt-soft);
    padding:3px 9px;border-radius:999px;}
  .badge-dev::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--cobalt);}

  /* progress rail */
  .rail{height:3px;background:var(--rule-soft);position:sticky;top:57px;z-index:19;}
  .rail-fill{height:100%;background:var(--cobalt);width:0;transition:width .35s cubic-bezier(.4,0,.2,1);}

  /* layout */
  .stage{max-width:680px;margin:0 auto;padding:48px 24px 120px;}
  .kicker{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--mute);margin-bottom:14px;}
  h1{font-family:var(--display);font-weight:700;letter-spacing:-0.01em;font-size:38px;line-height:1.08;margin:0 0 18px;}
  .lede{font-size:16px;color:var(--ink-2);margin:0 0 16px;}
  .meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 32px;}
  .chip{font-family:var(--mono);font-size:11px;letter-spacing:0.04em;color:var(--ink-2);
    background:var(--cream-2);border:1px solid var(--rule);padding:6px 11px;border-radius:6px;}
  .note{background:var(--paper);border:1px solid var(--rule);border-left:3px solid var(--cobalt);
    border-radius:8px;padding:14px 16px;font-size:13.5px;color:var(--mute);margin:24px 0;}
  .note b{color:var(--ink-2);font-weight:600;}

  /* consent disclosure */
  .consent{border:1px solid var(--rule);border-radius:10px;background:var(--paper);margin:8px 0 20px;overflow:hidden;}
  .consent summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:15px 18px;font-size:14.5px;font-weight:600;color:var(--ink);user-select:none;}
  .consent summary::-webkit-details-marker{display:none;}
  .consent summary:hover{background:var(--cream-2);}
  .consent-cue{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--cobalt);font-weight:500;display:flex;align-items:center;gap:6px;}
  .consent-cue::after{content:"+";font-size:14px;line-height:1;}
  .consent[open] .consent-cue::after{content:"–";}
  .consent[open] summary{border-bottom:1px solid var(--rule-soft);}
  .consent-body{padding:6px 18px 18px;font-size:13px;line-height:1.55;color:var(--mute);}
  .consent-body p{margin:12px 0 0;}
  .consent-body b{color:var(--ink-2);font-weight:600;}
  .consent-body a{color:var(--cobalt);}
  .consent-check{display:flex;gap:11px;align-items:flex-start;font-size:14px;color:var(--ink-2);
    line-height:1.45;margin:4px 0 2px;cursor:pointer;}
  .consent-check input{margin:2px 0 0;flex:none;width:16px;height:16px;accent-color:var(--cobalt);cursor:pointer;}

  /* section head */
  .sec-head{margin-bottom:26px;}
  .sec-label{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--cobalt);margin-bottom:10px;}
  .sec-title{font-family:var(--display);font-weight:700;font-size:27px;letter-spacing:-0.01em;margin:0 0 8px;}
  .sec-desc{color:var(--mute);font-size:14.5px;margin:0;}
  .recall{font-family:var(--display);font-size:21px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);
    line-height:1.3;margin-top:18px;padding-top:16px;border-top:1px solid var(--rule-soft);}
  .recall b{color:var(--cobalt);}

  /* items */
  .item{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:22px 22px 18px;margin-bottom:14px;
    transition:border-color .15s, box-shadow .15s;}
  .item.answered{border-color:var(--cobalt-soft);}
  .item-q{font-size:15.5px;font-weight:500;color:var(--ink);margin-bottom:16px;display:flex;gap:10px;}
  .item-n{font-family:var(--mono);font-size:12px;color:var(--mute);flex:none;padding-top:2px;}
  .scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .opt{appearance:none;border:1px solid var(--rule);background:var(--paper-tint);border-radius:8px;
    padding:12px 6px 10px;cursor:pointer;text-align:center;font-family:var(--sans);transition:all .12s;}
  .opt:hover{border-color:var(--cobalt-soft);background:#fff;}
  .opt .num{display:block;font-family:var(--mono);font-size:13px;color:var(--mute);margin-bottom:5px;}
  .opt .lab{display:block;font-size:11.5px;line-height:1.25;color:var(--ink-2);}
  .opt.sel{background:var(--cobalt);border-color:var(--cobalt);}
  .opt.sel .num,.opt.sel .lab{color:#fff;}

  /* demographics / adjunct fields */
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:14px;font-weight:500;margin-bottom:8px;}
  .field .opt-note{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);
    border:1px solid var(--rule);border-radius:3px;padding:1px 5px;margin-left:8px;vertical-align:middle;}
  select,input[type=text],input[type=number]{width:100%;font-family:var(--sans);font-size:14px;color:var(--ink);
    border:1px solid var(--rule);border-radius:8px;padding:11px 12px;background:var(--paper);}
  select:focus,input:focus{outline:none;border-color:var(--cobalt);}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{border:1px solid var(--rule);background:var(--paper);border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer;transition:all .12s;}
  .pill:hover{border-color:var(--cobalt-soft);}
  .pill.sel{background:var(--cobalt);border-color:var(--cobalt);color:#fff;}

  /* checkbox list */
  .check-list{display:flex;flex-direction:column;gap:8px;}
  .check-opt{display:flex;align-items:center;gap:12px;border:1px solid var(--rule);border-radius:10px;
    padding:13px 15px;cursor:pointer;font-size:14px;color:var(--ink-2);transition:all .12s;user-select:none;}
  .check-opt:hover{border-color:var(--cobalt-soft);}
  .check-opt.sel{border-color:var(--cobalt);background:rgba(92,125,250,0.05);color:var(--ink);font-weight:500;}
  .check-box{width:19px;height:19px;border:1.5px solid var(--rule);border-radius:6px;flex:none;
    display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .check-opt.sel .check-box{background:var(--cobalt);border-color:var(--cobalt);}
  .check-box::after{content:"\2713";color:#fff;font-size:12px;font-weight:700;line-height:1;opacity:0;transition:opacity .12s;}
  .check-opt.sel .check-box::after{opacity:1;}
  .check-text{display:flex;flex-direction:column;gap:3px;}
  .check-sub{font-size:12px;color:var(--mute);font-weight:400;line-height:1.35;}

  /* emotion intensity list */
  .emo-list{display:flex;flex-direction:column;gap:8px;}
  .emo{border:1px solid var(--rule);border-radius:10px;overflow:hidden;transition:border-color .12s;}
  .emo.sel{border-color:var(--cobalt-soft);}
  .emo-name{width:100%;text-align:left;background:none;border:none;font-family:var(--sans);font-size:14px;
    color:var(--ink-2);padding:12px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .emo.sel .emo-name{font-weight:600;color:var(--cobalt);}
  .emo-name .emo-tog{font-family:var(--mono);font-size:14px;color:var(--mute);}
  .emo.sel .emo-name .emo-tog{color:var(--cobalt);}
  .emo-slider{display:flex;flex-direction:column;gap:7px;padding:2px 15px 14px;}
  .emo-slider input[type=range]{width:100%;accent-color:var(--cobalt);height:4px;}
  .emo-readout{display:flex;align-items:baseline;gap:8px;}
  .emo-num{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--cobalt);}
  .emo-deg{font-family:var(--sans);font-size:13px;color:var(--ink);}
  .emo-axis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:0.02em;color:var(--mute);}

  /* nav */
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:34px;}
  .btn{font-family:var(--sans);font-size:14px;font-weight:600;border-radius:9px;padding:12px 22px;cursor:pointer;border:1px solid var(--rule);background:var(--paper);color:var(--ink);transition:all .14s;}
  .btn:hover{border-color:var(--ink-2);}
  .btn-primary{background:var(--cobalt);border-color:var(--cobalt);color:#fff;}
  .btn-primary:hover{background:#4a6bf0;border-color:#4a6bf0;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;background:var(--cobalt);}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--mute);}
  .btn-ghost:hover{color:var(--ink);border-color:transparent;}
  .stepcount{font-family:var(--mono);font-size:11px;color:var(--mute);}

  /* results */
  .score-overall{display:flex;align-items:baseline;gap:14px;margin:6px 0 30px;}
  .score-big{font-family:var(--display);font-weight:700;font-size:64px;line-height:1;color:var(--cobalt);}
  .score-overall .unit{font-family:var(--mono);font-size:12px;color:var(--mute);}
  .bar-row{margin-bottom:20px;}
  .bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .bar-name{font-size:14px;font-weight:600;}
  .bar-val{font-family:var(--mono);font-size:13px;color:var(--ink-2);}
  .bar{height:9px;background:var(--rule-soft);border-radius:999px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;width:0;transition:width .7s cubic-bezier(.4,0,.2,1);}
  .bar-desc{font-size:12.5px;color:var(--mute);margin-top:6px;}
  .group{margin-top:30px;}
  .group-head{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--rule);padding-top:22px;margin-bottom:3px;}
  .group-name{font-family:var(--display);font-weight:700;font-size:23px;letter-spacing:-0.01em;}
  .group-score{font-family:var(--mono);font-size:15px;color:var(--cobalt);}
  .group-sub{font-size:13.5px;color:var(--mute);margin:0 0 20px;}
  .hidden{display:none;}
  .center{text-align:center;}
  .site-credit{max-width:680px;margin:0 auto;padding:20px 24px 44px;border-top:1px solid var(--rule-soft);
    font-size:12px;color:var(--mute);text-align:center;line-height:1.65;}
  .site-credit a{color:var(--mute);text-decoration:underline;text-underline-offset:2px;}
  .site-credit a:hover{color:var(--cobalt);}
  .site-credit b{color:var(--ink-2);font-weight:600;}
  @media(max-width:560px){
    h1{font-size:30px;} .scale{gap:5px;} .opt{padding:10px 3px 8px;} .opt .lab{font-size:10px;}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="wordmark"><a href="https://www.dpifund.org/" target="_blank" rel="noopener">DPI</a><span class="dot">/</span><a href="https://civicpowerlab.us/" target="_blank" rel="noopener">Civic Power Lab</a></div>
    <div class="badge-dev">Dev preview</div>
  </div>
  <div class="rail"><div class="rail-fill" id="rail"></div></div>

  <div class="stage" id="stage"></div>

  <footer class="site-credit">
    A project of the <a href="https://www.dpifund.org/" target="_blank" rel="noopener">DPI Fund</a> and <a href="https://civicpowerlab.us/" target="_blank" rel="noopener">Civic Power Lab</a>.<br>
    Instrument design and analysis by <b>Miriam McKinney Gray</b> (McKinney Gray Analytics LLC) and <b>Liz McKenna</b> (Civic Power Lab).
  </footer>

<script>
/* ---------- instrument config ---------- */
const RECALL = "In the last 3 months"; // validation scale window; PICO deployment uses 8mo to match cohort
const ANCHORS = ["Never","Almost never","Sometimes","Fairly often","Very often"]; // PSS 0-4

const CONSTRUCTS = [
  { key:"personal", label:"Personal agency", color:"var(--dim-1)",
    desc:"Am I the author of my own action?",
    items:[
      {t:"felt able to act on what matters to you"},
      {t:"felt stuck, even when you wanted to act", rev:true},
      {t:"felt confident you could figure out how to do something about a problem in front of you"},
    ]},
  { key:"articulation", label:"Articulation", color:"var(--dim-2)",
    desc:"Can I name what I and others want, and why?",
    items:[
      {t:"felt able to put into words what you want to change"},
      {t:"felt clear about why something matters to you"},
      {t:"felt unable to explain what you and others are working toward", rev:true},
    ]},
  { key:"participatory", label:"Participatory efficacy", color:"var(--dim-3)",
    desc:"Does my contribution matter to our shared result?",
    items:[
      {t:"felt that what you do makes a real difference to what your group can achieve"},
      {t:"felt that your participation was basically interchangeable with anyone else's", rev:true},
      {t:"felt capable of bringing others in and helping them grow as leaders"},
    ]},
  { key:"collective", label:"Collective efficacy with horizon", color:"var(--dim-4)",
    desc:"Can we, working together, build toward something real?",
    items:[
      {t:"felt that when people like you act together, you have power to influence decisions made by institutions and leaders"},
      {t:"felt that the group or community you're part of is building toward something real"},
      {t:"felt that no matter how organized people get, things won't really change", rev:true},
    ]},
];

/* adjunct + context block (Miriam's adds: intersectional, political education, pre-conditioning) */
const RACE = ["American Indian / Alaska Native","Asian","Black, African American","Black, African","Hispanic / Latino","Middle Eastern","Native Hawaiian / Pacific Islander","White","Something else","Prefer not to say"];
const GENDER = ["Woman","Man","Nonbinary","Something else","Prefer not to say"];
const EDU = ["Less than high school","High school","Some college","2-year degree","4-year degree","Professional degree","Doctorate","Other"];
const EMOTIONS = ["Hope","Fear","Anger","Courage","Isolation","Resolve","Belonging","Solidarity","Joy","Burnout","Dignity","Shame"];
const INVOLVE = [
  {t:"By going to a protest or action once or twice"},
  {t:"By protesting or taking action regularly"},
  {t:"As an active member of an organization", sub:"You go to strategy meetings, serve on a team, or carry ongoing responsibilities"},
  {t:"I haven't been involved"},
];
// how others have engaged you: humanizing vs dehumanizing (formation vs mobilization)
const HUMAN = [
  {t:"felt seen as a whole person, not just a vote or a number"},
  {t:"felt that someone was genuinely curious about what you think"},
  {t:"felt respected as someone with something to contribute"},
  {t:"felt treated as a means to someone else's goal", rev:true},
  {t:"felt like a name on a list", rev:true},
];

/* ---------- state ---------- */
const state = { answers:{}, demo:{}, emotions:{}, human:{} };
let step = 0; // 0 cover, 1..4 constructs, 5 experience, 6 engagement, 7 emotions, 8 about, 9 results
const TOTAL = 9;

const stage = document.getElementById('stage');
const rail = document.getElementById('rail');

function setRail(){
  const pct = step===0 ? 0 : Math.round((step/TOTAL)*100);
  rail.style.width = pct + "%";
}

function coreCount(){ return CONSTRUCTS.reduce((n,c)=>n+c.items.length,0); }
function answeredCount(){ return Object.keys(state.answers).length; }

function render(){
  setRail();
  window.scrollTo({top:0,behavior:'instant'});
  if(step===0) return renderCover();
  if(step>=1 && step<=4) return renderConstruct(step-1);
  if(step===5) return renderExperience();
  if(step===6) return renderEngagement();
  if(step===7) return renderEmotions();
  if(step===8) return renderAbout();
  if(step===9) return renderResults();
}

function renderCover(){
  stage.innerHTML = `
    <div class="kicker">DPI Fund · Civic Power Lab · Agency Research</div>
    <h1>Agency Instrument</h1>
    <p class="lede">A short research survey about how people experience power and agency in their organizing. Your answers help us understand how leaders and communities build the capacity to act together.</p>
    <div class="meta-chips">
      <span class="chip">About 15 minutes</span>
      <span class="chip">Voluntary</span>
      <span class="chip">IRB-approved</span>
    </div>
    <p class="sec-desc" style="margin-bottom:18px">You are invited to take part because you are a member of a community organization. Taking part is completely up to you, and you can skip any question or stop at any time.</p>

    <details class="consent">
      <summary>Consent to participate in research <span class="consent-cue">Read full statement</span></summary>
      <div class="consent-body">
        <p><b>Voluntary participation.</b> Whether or not you take part is up to you. You can agree now and change your mind later. Refusing or stopping will not be held against you and costs you no benefit you are otherwise entitled to.</p>
        <p><b>What this involves.</b> We are studying how power and agency develop in organizational settings. The survey takes about 15 minutes and asks about your experiences and outlook.</p>
        <p><b>Risks and benefits.</b> We believe the risks are minimal. There is no direct benefit to you. Your responses may help scholars better understand the civic power landscape in the United States.</p>
        <p><b>Privacy.</b> We limit use and disclosure of your information to people who need to review it, but cannot promise complete confidentiality. The Institutional Review Board and other authorized representatives may inspect and copy your information. Once identifiers are removed, de-identified data may be used or shared for future research without your additional consent.</p>
        <p><b>Questions.</b> Contact the principal investigator, Elizabeth McKenna, Harvard University (<a href="mailto:emckenna@hks.harvard.edu">emckenna@hks.harvard.edu</a>). For questions about your rights as a research participant, or if you cannot reach the research team, contact the Harvard University Area IRB at (617) 496-2847 or <a href="mailto:cuhs@harvard.edu">cuhs@harvard.edu</a>.</p>
        <p>This research has been reviewed and approved by the Harvard University Area Institutional Review Board.</p>
      </div>
    </details>

    <label class="consent-check"><input type="checkbox" id="consentBox" onchange="document.getElementById('beginBtn').disabled=!this.checked"> I have read the information above and agree to take part in this research.</label>

    <div class="nav"><span></span><button class="btn btn-primary" id="beginBtn" disabled onclick="go(1)">Begin →</button></div>
  `;
}

function renderConstruct(i){
  const c = CONSTRUCTS[i];
  const startN = CONSTRUCTS.slice(0,i).reduce((n,x)=>n+x.items.length,0);
  stage.innerHTML = `
    <div class="sec-head">
      <div class="sec-label">Dimension ${i+1} of 4</div>
      <h2 class="sec-title">${c.label}</h2>
      <p class="sec-desc">${c.desc}</p>
      <div class="recall"><b>${RECALL}</b>, how often have you…</div>
    </div>
    ${c.items.map((it,j)=>{
      const id = c.key+"_"+j;
      const cur = state.answers[id];
      return `<div class="item ${cur!==undefined?'answered':''}" id="card_${id}">
        <div class="item-q"><span class="item-n">${String(startN+j+1).padStart(2,'0')}</span><span>…${it.t}?</span></div>
        <div class="scale">
          ${ANCHORS.map((a,k)=>`<button class="opt ${cur===k?'sel':''}" onclick="answer('${id}',${k})">
            <span class="num">${k}</span><span class="lab">${a}</span></button>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div class="nav">
      <button class="btn btn-ghost" onclick="go(${step-1})">← Back</button>
      <span class="stepcount">${answeredCount()} / ${coreCount()} answered</span>
      <button class="btn btn-primary" id="nextBtn" ${constructComplete(i)?'':'disabled'} onclick="go(${step+1})">Continue →</button>
    </div>
  `;
}

function constructComplete(i){
  const c = CONSTRUCTS[i];
  return c.items.every((it,j)=> state.answers[c.key+"_"+j]!==undefined);
}

function answer(id,k){
  state.answers[id]=k;
  // light re-render of just this construct to update selection + next button
  renderConstruct(step-1);
}

function renderExperience(){
  stage.innerHTML = `
    <div class="sec-head">
      <div class="sec-label">Your experience</div>
      <h2 class="sec-title">Your recent experience</h2>
      <p class="sec-desc">A few questions about your civic and political life and how it has felt.</p>
    </div>

    <div class="field">
      <label>${RECALL}, how have you taken part in civic or political life? <span class="opt-note">check all that apply</span></label>
      <div class="check-list">${INVOLVE.map((a,k)=>`<div class="check-opt ${state.demo.involve&&state.demo.involve[k]?'sel':''}" onclick="toggleInvolve(${k})"><span class="check-box"></span><span class="check-text">${a.t}${a.sub?`<span class="check-sub">${a.sub}</span>`:''}</span></div>`).join('')}</div>
    </div>

    <div class="field" style="margin-top:28px">
      <label>${RECALL.replace('In','Over')}, how often have you taken part in political education or training?</label>
      <div class="pill-row">${ANCHORS.map((a,k)=>`<button class="pill ${state.demo.poled===k?'sel':''}" onclick="state.demo.poled=${k};renderExperience()">${a}</button>`).join('')}</div>
    </div>

    <div class="field" style="margin-top:28px">
      <label>Growing up, I believed my group could shape the world around it.</label>
      <div class="pill-row">${["Strongly disagree","Disagree","Neutral","Agree","Strongly agree"].map((a,k)=>`<button class="pill ${state.demo.precond===k?'sel':''}" onclick="state.demo.precond=${k};renderExperience()">${a}</button>`).join('')}</div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" onclick="go(4)">← Back</button>
      <button class="btn btn-primary" onclick="go(6)">Continue →</button>
    </div>
  `;
}

function renderEngagement(){
  stage.innerHTML = `
    <div class="sec-head">
      <div class="sec-label">How you've been engaged</div>
      <h2 class="sec-title">Being brought in</h2>
      <p class="sec-desc">How it has felt when other people have tried to involve you in civic or political life.</p>
      <div class="recall"><b>${RECALL}</b>, when people tried to involve you, how often have you…</div>
    </div>
    ${HUMAN.map((it,j)=>{
      const cur = state.human[j];
      return `<div class="item ${cur!==undefined?'answered':''}">
        <div class="item-q"><span class="item-n">${String(j+1).padStart(2,'0')}</span><span>…${it.t}?</span></div>
        <div class="scale">
          ${ANCHORS.map((a,k)=>`<button class="opt ${cur===k?'sel':''}" onclick="state.human[${j}]=${k};renderEngagement()">
            <span class="num">${k}</span><span class="lab">${a}</span></button>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div class="nav">
      <button class="btn btn-ghost" onclick="go(5)">← Back</button>
      <button class="btn btn-primary" onclick="go(7)">Continue →</button>
    </div>
  `;
}

function renderEmotions(){
  stage.innerHTML = `
    <div class="sec-head">
      <div class="sec-label">How it has felt</div>
      <h2 class="sec-title">Your feelings</h2>
      <p class="sec-desc">${RECALL}, which of these have you felt about your civic or political life, and how strongly? Tap each one you felt.</p>
    </div>
    <div class="emo-list">${EMOTIONS.map(e=>{
      const v = state.emotions[e]; const sel = v!==undefined;
      return `<div class="emo ${sel?'sel':''}">
        <button class="emo-name" onclick="toggleEmotion('${e}')">${e}<span class="emo-tog">${sel?'✓':'+'}</span></button>
        ${sel?`<div class="emo-slider">
          <div class="emo-readout"><span class="emo-num">${v}</span><span class="emo-deg">${degLabel(v)}</span></div>
          <input type="range" min="0" max="4" step="1" value="${v}" oninput="state.emotions['${e}']=+this.value;const r=this.parentNode.querySelector('.emo-readout');r.querySelector('.emo-num').textContent=this.value;r.querySelector('.emo-deg').textContent=degLabel(+this.value)">
          <div class="emo-axis"><span>0 · Not at all</span><span>2 · Moderately</span><span>4 · Extremely</span></div>
        </div>`:''}
      </div>`;
    }).join('')}</div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="go(6)">← Back</button>
      <button class="btn btn-primary" onclick="go(8)">Continue →</button>
    </div>
  `;
}

function renderAbout(){
  stage.innerHTML = `
    <div class="sec-head">
      <div class="sec-label">About you</div>
      <h2 class="sec-title">A little about you</h2>
      <p class="sec-desc">Tell us who you are, then a little about your background. This helps us understand how agency shows up across different experiences.</p>
    </div>

    <div class="field" style="display:flex;gap:14px">
      <div style="flex:1"><label>Your name <span class="opt-note">optional</span></label><input type="text" placeholder="First and last" value="${state.demo.name||''}" oninput="state.demo.name=this.value"></div>
      <div style="flex:1"><label>Your organization</label><input type="text" placeholder="Where you organize" value="${state.demo.org||''}" oninput="state.demo.org=this.value"></div>
    </div>

    <div class="field">
      <label>Racial / ethnic identity</label>
      <select onchange="state.demo.race=this.value">${optList(RACE, state.demo.race)}</select>
    </div>
    <div class="field">
      <label>Gender</label>
      <select onchange="state.demo.gender=this.value">${optList(GENDER, state.demo.gender)}</select>
    </div>
    <div class="field" style="display:flex;gap:14px">
      <div style="flex:1"><label>Year of birth</label><input type="number" placeholder="e.g. 1985" value="${state.demo.yob||''}" oninput="state.demo.yob=this.value"></div>
      <div style="flex:2"><label>Highest education</label><select onchange="state.demo.edu=this.value">${optList(EDU, state.demo.edu)}</select></div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" onclick="go(7)">← Back</button>
      <button class="btn btn-primary" onclick="go(9)">See results →</button>
    </div>
  `;
}
function optList(arr,sel){ return `<option value="" ${sel?'':'selected'} disabled>Select…</option>`+arr.map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join(''); }

function subscale(c){
  const vals = c.items.map((it,j)=>{ let v=state.answers[c.key+"_"+j]; return it.rev ? 4-v : v; });
  const mean = vals.reduce((a,b)=>a+b,0)/vals.length; // 0..4
  return Math.round((mean/4)*100); // 0..100
}

const GROUPS = [
  { name:"Individual agency", keys:["personal","articulation"],
    sub:"How much you feel like the author of your own action, and able to name what you want." },
  { name:"Collective agency", keys:["participatory","collective"],
    sub:"How much you feel your part matters, and that your community can build power together." },
];

function renderResults(){
  const byKey = {}; CONSTRUCTS.forEach(c=>byKey[c.key]=subscale(c));
  const overall = Math.round(Object.values(byKey).reduce((a,b)=>a+b,0)/4);
  const dimByKey = {}; CONSTRUCTS.forEach(c=>dimByKey[c.key]=c);
  const bar = (c)=>`
      <div class="bar-row">
        <div class="bar-top"><span class="bar-name">${c.label}</span><span class="bar-val">${byKey[c.key]}</span></div>
        <div class="bar"><div class="bar-fill" style="background:${c.color}" data-w="${byKey[c.key]}"></div></div>
        <div class="bar-desc">${c.desc}</div>
      </div>`;
  stage.innerHTML = `
    <div class="sec-label">Your results</div>
    <h2 class="sec-title" style="margin-bottom:4px">Your agency profile</h2>
    <p class="sec-desc">A picture of how you see your own capacity, and your shared capacity with others.</p>
    <div class="score-overall"><span class="score-big">${overall}</span><span class="unit">overall / 100</span></div>
    ${GROUPS.map(g=>{
      const gs = Math.round(g.keys.reduce((a,k)=>a+byKey[k],0)/g.keys.length);
      return `<div class="group">
        <div class="group-head"><span class="group-name">${g.name}</span><span class="group-score">${gs} / 100</span></div>
        <p class="group-sub">${g.sub}</p>
        ${g.keys.map(k=>bar(dimByKey[k])).join('')}
      </div>`;
    }).join('')}
    <div class="note" style="margin-top:30px"><b>Reading your profile.</b> These dimensions usually move at different speeds. Personal agency reflects whether you feel like the author of your own action, and it tends to stay fairly steady. The others tend to grow as you take on more shared work with others, like naming what your group wants and seeing that your own part matters to the result. Taller collective bars often reflect time spent organizing alongside other people.</div>
    <div class="nav"><button class="btn btn-ghost" onclick="restart()">↺ Start over</button><span class="stepcount">Demo only · validation in progress</span></div>
  `;
  requestAnimationFrame(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+"%"));
}

function toggleInvolve(k){
  state.demo.involve = state.demo.involve || {};
  const none = INVOLVE.length-1; // "I haven't been involved" is exclusive
  if(k===none){ const on=!state.demo.involve[none]; state.demo.involve={}; if(on) state.demo.involve[none]=true; }
  else { if(state.demo.involve[k]) delete state.demo.involve[k]; else state.demo.involve[k]=true; delete state.demo.involve[none]; }
  renderExperience();
}
function toggleEmotion(e){
  if(state.emotions[e]!==undefined) delete state.emotions[e];
  else state.emotions[e]=2; // default to a moderate degree when first selected
  renderEmotions();
}
// PANAS intensity anchors (Watson, Clark & Tellegen 1988)
function degLabel(v){
  return ["Not at all","A little","Moderately","Quite a bit","Extremely"][v];
}

function go(n){ step=n; render(); }
function restart(){ state.answers={}; state.demo={}; state.emotions={}; state.human={}; step=0; render(); }

render();
</script>
</body>
</html>
